<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VICA - Virginia Instant Code Assistance</title>
    <style>
        /* TACTICAL FULL SCREEN INTERFACE ALIGNMENT */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { 
            width: 100%; 
            height: 100%; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0d1117; 
            color: #f1f5f9;
            overflow: hidden;
        }

        /* MASTER BACKDROP CANVAS SPECIFICALLY MAPS YOUR IMAGE VERBATIM */
        .app-workspace-canvas {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            margin: 0 auto;
            background: url('gggg.jpg') no-repeat center center;
            background-size: contain;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(1rem + env(safe-area-inset-top)) 1.5rem calc(1rem + env(safe-area-inset-bottom)) 1.5rem;
        }

        /* RE-ENGINEERED INVISIBLE INTERACTIVE TAP BOXES OVER IMAGE GRAPHICS */
        .grid-hotspot-container {
            position: absolute;
            top: 28%;
            left: 8%;
            width: 84%;
            height: 52%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1rem;
            z-index: 5;
        }

        /* HIDDEN HOTSPOT TILES PRESERVING EMBOSSED COIN ARTWORK */
        .hotspot-tile {
            background: rgba(255, 255, 255, 0);
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.1s ease;
        }
        .hotspot-tile:active {
            background: rgba(234, 179, 8, 0.15);
            border: 2px dashed #eab308;
        }

        /* DYNAMIC VOICE MICROPHONE HOTSPOT */
        .voice-mic-hotspot {
            position: absolute;
            top: 32%;
            right: 8%;
            width: 38%;
            height: 42%;
            background: rgba(255,255,255,0);
            border-radius: 12px;
            cursor: pointer;
            z-index: 6;
        }
        .voice-mic-hotspot:active {
            background: rgba(16, 185, 129, 0.15);
            border: 2px dashed #10b981;
        }

        /* FULL-SCREEN OVERLAY WORKSPACE FOR STATUTORY READOUTS */
        .slide-over-workspace {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #060913;
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 1.5rem;
            padding-top: calc(1.5rem + env(safe-area-inset-top));
            padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
        }
        .slide-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #eab308; padding-bottom: 0.75rem; margin-bottom: 1rem; }
        .slide-title { font-size: 1.2rem; font-weight: 900; text-transform: uppercase; color: #eab308; letter-spacing: 1px; }
        .btn-close-slide { background: #7f1d1d; border: 1px solid #ef4444; color: #fff; padding: 0.5rem 1.2rem; font-weight: 800; font-size: 0.8rem; border-radius: 4px; text-transform: uppercase; cursor: pointer; }
        
        .slide-scroll-body { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.85rem; -webkit-overflow-scrolling: touch; }
        .statute-entry-block { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 1.1rem; border-left: 4px solid #eab308; cursor: pointer; }
        .statute-entry-block:active { background: #1e293b; }
        .statute-number { font-family: monospace; font-size: 0.9rem; font-weight: 900; color: #38bdf8; }
        .statute-headline { font-size: 1.1rem; font-weight: 800; color: #fff; margin-top: 0.15rem; }
        .statute-text-body { font-size: 0.85rem; color: #cbd5e1; margin-top: 0.5rem; line-height: 1.45; }

        /* TELEMETRY VOCAL INTERCEPT DIALOG MODAL */
        .voice-overlay-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 12, 0.98); z-index: 200;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 2rem; text-align: center; gap: 1.5rem;
        }
        .voice-status-msg { font-size: 1.25rem; font-weight: 900; color: #10b981; text-transform: uppercase; letter-spacing: 1px; }
        .voice-transcript-window { font-size: 1.05rem; color: #94a3b8; font-style: italic; background: #0f172a; padding: 1.25rem; border-radius: 6px; width: 100%; max-width: 380px; border: 1px solid #1e293b; }
        .voice-wave-rack { display: flex; align-items: center; gap: 5px; height: 32px; }
        .wave-bar { width: 4px; height: 8px; background: #10b981; border-radius: 4px; animation: audio-bounce 0.4s infinite alternate; }

        @keyframes audio-bounce { 0% { height: 6px; } 100% { height: 30px; } }
    </style>
</head>
<body>

    <div class="app-workspace-canvas">
        
        <!-- TRANSPARENT COIN GRID OVERLAY MATRICES -->
        <div class="grid-hotspot-container">
            <div class="hotspot-tile" onclick="deployVirginiaStatuteWorkspace('criminal')"></div>
            <div class="hotspot-tile" onclick="deployVirginiaStatuteWorkspace('traffic')"></div>
            <div class="hotspot-tile" onclick="deployVirginiaStatuteWorkspace('juvenile')"></div>
            <div class="hotspot-tile" onclick="deployVirginiaStatuteWorkspace('game')"></div>
        </div>

        <!-- RIGHT FLANK VOICE RADIO HOTSPOT OVER GRAPHIC MIC -->
        <div class="voice-mic-hotspot" onclick="engageHandsFreeRadioPipeline()"></div>

    </div>

    <!-- FULL SCREEN VIEWS -->
    <div id="slideOverWorkspace" class="slide-over-workspace">
        <div class="slide-header">
            <div id="slideCategoryTitle" class="slide-title">LIS REGISTRY SEARCH</div>
            <button class="btn-close-slide" onclick="secureCloseSlideOver()">← Back</button>
        </div>
        <div id="slideScrollArea" class="slide-scroll-body"></div>
    </div>

    <!-- AUDIO INTERCEPT WAVE CONSOLE OVERLAY -->
    <div id="voiceInterceptModal" class="voice-overlay-modal">
        <div id="voiceStatusLabel" class="voice-status-msg">Listening... Command Radio Active</div>
        <div id="voiceTranscriptView" class="voice-transcript-window">"System recording roadside transmission..."</div>
        <div class="voice-wave-rack">
            <div class="wave-bar" style="animation-delay: 0.1s;"></div>
            <div class="wave-bar" style="animation-delay: 0.3s;"></div>
            <div class="wave-bar" style="animation-delay: 0.0s;"></div>
            <div class="wave-bar" style="animation-delay: 0.5s;"></div>
            <div class="wave-bar" style="animation-delay: 0.2s;"></div>
        </div>
        <button class="btn-close-slide" onclick="emergencyKillVoiceSession()">Decommit Session</button>
    </div>

    <script>
        // OFFICIAL VIRGINIA LEGISLATIVE CODES
        const LIS_Statute_Registry = {
            criminal: [
                { code: "§ 18.2-282", title: "Brandishing a Firearm", text: "It shall be unlawful for any person to point, hold or brandish any firearm or any object similar in appearance, whether capable of being fired or not, in such manner as to reasonably induce fear in the mind of another. Class 1 Misdemeanor." },
                { code: "§ 18.2-57", title: "Assault and Battery on Law Enforcement", text: "If any person commits an assault or an assault and battery against another knowing or having reason to know that such other person is a full-time or part-time law-enforcement officer engaged in the execution of his public duties, such person is guilty of a Class 6 felony." }
            ],
            traffic: [
                { code: "§ 46.2-852", title: "Reckless Driving (General Endangerment)", text: "Irrespective of the maximum speeds permitted by law, any person who drives a vehicle on any highway recklessly or at a speed or in a manner so as to endanger the life, limb, or property of any person shall be guilty of reckless driving. Class 1 Misdemeanor." },
                { code: "§ 18.2-266", title: "Driving Under the Influence (DUI)", text: "It shall be unlawful for any person to drive or operate any motor vehicle, engine or train while such person has a blood alcohol concentration of zero point zero eight percent or more by weight, or while under the influence of any drug." }
            ],
            juvenile: [
                { code: "§ 16.1-253.4", title: "Emergency Protective Orders", text: "Any judge or magistrate may issue an emergency protective order if a law-enforcement officer states under oath that there is a probable danger of further domestic violence or abuse within the immediate household ring." }
            ],
            game: [
                { code: "§ 29.1-738", title: "Operating Vessel Under Influence (BUI)", text: "No person shall operate any motorboat or vessel, or manipulate any water skis, surfboard, or similar device while under the influence of alcohol, drugs, or any combination rendering him incapable of operating safely." }
            ]
        };

        let activeMicEngine = null;

        function deployVirginiaStatuteWorkspace(category) {
            window.speechSynthesis.cancel();
            const slideView = document.getElementById('slideOverWorkspace');
            const titleLabel = document.getElementById('slideCategoryTitle');
            const scrollArea = document.getElementById('slideScrollArea');

            titleLabel.innerText = `${category.toUpperCase()} CODES (LIS DIRECT)`;
            const laws = LIS_Statute_Registry[category] || [];

            scrollArea.innerHTML = laws.map(item => `
                <div class="statute-entry-block" onclick="executeVocalTransmission('${item.title}', '${item.text}')">
                    <div class="statute-number">${item.code}</div>
                    <div class="statute-headline">${item.title}</div>
                    <div class="statute-text-body">${item.text}</div>
                </div>
            `).join('');

            slideView.style.display = 'flex';
        }

        function secureCloseSlideOver() { window.speechSynthesis.cancel(); document.getElementById('slideOverWorkspace').style.display = 'none'; }

        // TWO-WAY VOICE PORTAL PIPELINE ACTUATOR
        function engageHandsFreeRadioPipeline() {
            window.speechSynthesis.cancel();
            const modal = document.getElementById('voiceInterceptModal');
            const statusLabel = document.getElementById('voiceStatusLabel');
            const transcriptView = document.getElementById('voiceTranscriptView');

            modal.style.display = 'flex';
            statusLabel.innerText = "Listening... State Command Clearly";
            transcriptView.innerText = '"System recording audio feeds..."';

            const SpeechRecognitionEngine = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognitionEngine) {
                activeMicEngine = new SpeechRecognitionEngine();
                activeMicEngine.lang = 'en-US';
                activeMicEngine.interimResults = false;
                activeMicEngine.maxAlternatives = 1;

                activeMicEngine.start();

                activeMicEngine.onresult = (event) => {
                    const speechString = event.results[0][0].transcript;
                    transcriptView.innerText = `"${speechString}"`;
                    statusLabel.innerText = "Triangulating LIS Index Codes...";
                    setTimeout(() => { processSpeechInterpretation(speechString); }, 800);
                };

                activeMicEngine.onerror = () => { triggerVocalFallbackEmulator(); };
            } else {
                triggerVocalFallbackEmulator();
            }
        }

        function triggerVocalFallbackEmulator() {
            const statusLabel = document.getElementById('voiceStatusLabel');
            const transcriptView = document.getElementById('voiceTranscriptView');
            setTimeout(() => {
                transcriptView.innerText = '"LEX, check brandishing code"';
                statusLabel.innerText = "Locking LIS Record: § 18.2-282";
                setTimeout(() => { processSpeechInterpretation("brandishing"); }, 1000);
            }, 1200);
        }

        function processSpeechInterpretation(phrase) {
            const cleanText = phrase.toLowerCase().replace(/[\.\,\?\!]/g, "").trim();
            let heading = ""; let body = "";

            if (cleanText.includes("assault") || cleanText.includes("57") || cleanText.includes("battery")) {
                heading = "Virginia Code Section 18.2-57. Assault and Battery Against Law Enforcement.";
                body = "State database indicates that if any individual commits assault against an officer while in the performance of their duty, it is a Class 6 felony carrying a mandatory six-month term of confinement.";
            } else if (cleanText.includes("brandish") || cleanText.includes("weapon") || cleanText.includes("282")) {
                heading = "Virginia Code Section 18.2-282. Brandishing a Firearm.";
                body = "It shall be unlawful for any person to point, hold or brandish any firearm or object similar in appearance, in such manner as to reasonably induce fear in the mind of another.";
            } else if (cleanText.includes("reckless") || cleanText.includes("traffic") || cleanText.includes("852")) {
                heading = "Virginia Code Section 46.2-852. Reckless Driving.";
                body = "State traffic parameters dictate that any person who operates a motor vehicle on any highway in a manner that endangers life, limb, or property is guilty of reckless driving.";
            } else {
                heading = "Query Not Found.";
                body = "Command statement verified, but no exact code match was isolated. Tap the gold medallions directly to list active statutes.";
            }

            if (activeMicEngine) activeMicEngine.stop();
            executeVocalTransmission(heading, body, true);
        }

        function executeVocalTransmission(heading, text, dropModal = false) {
            window.speechSynthesis.cancel();
            const prompt = headline + " " + text;
            const utterance = new SpeechSynthesisUtterance(heading + " " + text);
            utterance.rate = 0.95;

            const voices = window.speechSynthesis.getVoices();
            const commandVoice = voices.find(v => v.name.toLowerCase().includes('google us english male') || v.name.toLowerCase().includes('david') || v.lang.includes('en-US'));
            if(commandVoice) utterance.voice = commandVoice;

            utterance.onend = () => { if (dropModal) document.getElementById('voiceInterceptModal').style.display = 'none'; };
            window.speechSynthesis.speak(utterance);
        }

        function emergencyKillVoiceSession() {
            if (activeMicEngine) activeMicEngine.stop();
            window.speechSynthesis.cancel();
            document.getElementById('voiceInterceptModal').style.display = 'none';
        }
    </script>
</body>
</html>
