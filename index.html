<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEX - Direct Tactical Lookup</title>
    <style>
        body { background: #0c111d; color: #fff; font-family: sans-serif; text-align: center; }
        .status { color: #22c55e; font-weight: bold; margin: 20px; }
        .btn { background: #eab308; color: #000; padding: 15px; border-radius: 5px; border: none; font-weight: bold; width: 80%; margin: 10px; }
    </style>
</head>
<body>
    <div id="lexStatus" class="status">🎙️ SYSTEM READY (DIRECT LOOKUP)</div>
    <div id="lexBackdrop" style="width:100%; height: 300px; background-size: contain; background-repeat: no-repeat; background-position: center;"></div>
    <button class="btn" onclick="startLexLookup()">TAP TO SPEAK COMMAND</button>

    <script>
        // OFFICIAL MAPPING: Maps your voice to the exact VA Code Section
        const codeMap = {
            "dui": "18.2-266", "dwi": "18.2-266", "intoxicated": "18.2-266",
            "suspended": "46.2-301", "suspended license": "46.2-301",
            "reckless": "46.2-852", "reckless driving": "46.2-852",
            "larceny": "18.2-95", "trespassing": "18.2-119"
        };

        function startLexLookup() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRecognition();
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript.toLowerCase();
                document.getElementById('lexStatus').innerText = "LOOKING UP: " + text;
                
                // Find matching key
                let foundKey = Object.keys(codeMap).find(key => text.includes(key));
                
                if (foundKey) {
                    fetchLiveCode(codeMap[foundKey]);
                } else {
                    alert("No direct match for: " + text);
                }
            };
            rec.start();
        }

        async function fetchLiveCode(section) {
            // Direct call to Virginia Law API using the specific Section ID
            const url = `https://law.lis.virginia.gov/vacode/${section}/`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            
            try {
                const res = await fetch(proxy);
                const data = await res.json();
                // Extract clean text from the HTML response
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                const content = doc.querySelector('.code-section-text')?.innerText || "No text found.";
                alert("SECTION " + section + ":\n\n" + content.substring(0, 300) + "...");
            } catch (e) {
                alert("Connection failed. Check your API access.");
            }
        }
    </script>
</body>
</html>
