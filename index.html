<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEX - Virginia Instant Code Assistant</title>
    <style>
        /* SAFE AREA BOUNDARIES FOR SMARTPHONES */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { 
            width: 100%; 
            height: 100%; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #020208; 
            color: #f8fafc; 
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        /* MASTER ISOLATED CANVAS CONTAINMENT */
        .lex-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #020208;
            z-index: 10;
        }

        /* BACKGROUND IMMERSION LOCK PANEL ROUTED DIRECTLY TO PNG SYSTEM */
        .lex-backdrop {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* TRANSPARENT COVER HIT ENGINE OVER IMAGE MEDALLIONS */
        .lex-interaction-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: calc(4rem + env(safe-area-inset-bottom));
        }

        /* TACTICAL UTILITY FOOTER CONTROL PANEL */
        .lex-footer-menu {
            width: 90%;
            max-width: 380px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.92);
            border: 2px solid rgba(234, 179, 8, 0.5);
            border-radius: 8px;
            padding: 1rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .lex-status-readout {
            font-family: monospace;
            font-size: 0.75rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #22c55e;
            background: #000000;
            padding: 0.4rem;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: bold;
        }

        .lex-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(180deg, #1e293b, #0f172a);
            border: 1px solid rgba(234, 179, 8, 0.5);
            color: #eab308;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .lex-btn:active {
            background: #eab308;
            color: #000000;
            border-color: #ffffff;
        }

        /* SYSTEM DIALOG POPUP WINDOW MATRIX */
        .lex-popup-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 2, 8, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .lex-popup-card {
            width: 100%;
            max-width: 360px;
            background: #0f172a;
            border: 2px solid #eab308;
            border-radius: 6px;
            padding: 1.2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .lex-popup-title {
            font-size: 1.1rem;
            font-weight: 900;
            color: #eab308;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(234, 179, 8, 0.3);
            padding-bottom: 0.4rem;
            margin-bottom: 0.8rem;
            text-align: center;
        }
        .lex-popup-content {
            font-size: 0.85rem;
            line-height: 1.4;
            color: #cbd5e1;
            margin-bottom: 1rem;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 0.5rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="lex-container">
        <div id="lexBackdrop" class="lex-backdrop"></div>

        <div class="lex-interaction-overlay">
            <div class="lex-footer-menu">
                <div id="lexStatus" class="lex-status-readout">🎙️ Voice System Standby</div>
                <button class="lex-btn" onclick="activateVoiceSearchEngine()">Tap to Speak Command</button>
                <button class="lex-btn" style="color: #cbd5e1; border-color: rgba(255,255,255,0.2);" onclick="openManualIndexPopup()">Manual Index Database</button>
            </div>
        </div>
    </div>

    <div id="lexPopup" class="lex-popup-overlay">
        <div class="lex-popup-card">
            <div id="lexPopupTitle" class="lex-popup-title">Statute Lookup Result</div>
            <div id="lexPopupContent" class="lex-popup-content"></div>
            <button class="lex-btn" onclick="closeLexPopupDisplay()">Dismiss Record</button>
        </div>
    </div>

    <script>
        // Precision PNG targeted image loader with hardware cache block execution
        window.addEventListener('load', () => {
            const backdrop = document.getElementById('lexBackdrop');
            const cacheBuster = "?v=" + new Date().getTime();
            
            const img = new Image();
            img.onload = () => {
                // Pin point target to your exact uploaded image file asset
                backdrop.style.backgroundImage = `url('gggg.png${cacheBuster}')`;
                console.log("LEX interface graphic successfully deployed.");
            };
            img.onerror = () => {
                // Case sensitivity fail-safe layer
                backdrop.style.backgroundImage = `url('gggg.PNG${cacheBuster}')`;
            };
            img.src = 'gggg.png';
        });

        const vaStatuteDatabase = {
            "grand larceny": {
                code: "§ 18.2-95",
                class: "Felony",
                details: "Grand larceny consists of simple larceny not from the person of another of goods/chattels of value of $1,000 or more, or simple larceny from the person of another of money or thing of value of $5 or more."
            },
            "trespassing": {
                code: "§ 18.2-119",
                class: "Class 1 Misdemeanor",
                details: "If any person without authority of law goes upon or remains upon the lands, buildings or premises of another, after having been forbidden to do so, either orally or in writing, by the owner or lessee."
            },
            "reckless driving": {
                code: "§ 46.2-852",
                class: "Class 1 Misdemeanor",
                details: "Irrespective of the maximum speeds permitted by law, any person who drives a vehicle on any highway recklessly or at a speed or in a manner so as to endanger the life, limb, or property of any person shall be guilty of reckless driving."
            }
        };

        function activateVoiceSearchEngine() {
            window.speechSynthesis.cancel();
            const statusBox = document.getElementById('lexStatus');
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                statusBox.innerText = "❌ Browser Speech Not Supported";
                statusBox.style.color = "#ef4444";
                return;
            }

            // Fixed internal constructor for webkit cross compatibility alignment
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                statusBox.innerText = "Listening for Code Keyword...";
                statusBox.style.color = "#eab308";
            };

            recognition.onerror = () => {
                statusBox.innerText = "🎙️ Voice System Standby";
                statusBox.style.color = "#22c55e";
            };

            recognition.onresult = (event) => {
                const spokenText = event.results[0][0].transcript.toLowerCase();
                statusBox.innerText = `Heard: "${spokenText}"`;
                statusBox.style.color = "#38bdf8";
                
                let matchFound = false;
                for (let keyword in vaStatuteDatabase) {
                    if (spokenText.includes(keyword)) {
                        executeStatuteMatchDisplay(keyword);
                        matchFound = true;
                        break;
                    }
                }

                if (!matchFound) {
                    setTimeout(() => {
                        statusBox.innerText = "🎙️ Voice System Standby";
                        statusBox.style.color = "#22c55e";
                        speakVerbalResponse("No direct statute match located.");
                    }, 1200);
                }
            };

            recognition.start();
        }

        function executeStatuteMatchDisplay(key) {
            const data = vaStatuteDatabase[key];
            document.getElementById('lexPopupTitle').innerText = `${data.code} - ${key.toUpperCase()}`;
            document.getElementById('lexPopupContent').innerHTML = `
                <p style="margin-bottom: 0.5rem;"><b>Classification:</b> <span style="color:#eab308;">${data.class}</span></p>
                <p><b>Statutory Language:</b> ${data.details}</p>
            `;
            document.getElementById('lexPopup').style.display = 'flex';
            
            const verbalScript = `Virginia Code Section ${data.code}. Classified as a ${data.class}. Law details: ${data.details}`;
            speakVerbalResponse(verbalScript);
        }

        function speakVerbalResponse(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }

        function openManualIndexPopup() {
            document.getElementById('lexPopupTitle').innerText = "Virginia Statutory Index";
            let listHtml = "<ul style='list-style:none;'>";
            for (let keyword in vaStatuteDatabase) {
                listHtml += `<li style='padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); color:#38bdf8; cursor:pointer;' onclick='closeLexPopupDisplay(); executeStatuteMatchDisplay("${keyword}");'><b>${vaStatuteDatabase[keyword].code}</b> - ${keyword.toUpperCase()}</li>`;
            }
            listHtml += "</ul>";
            document.getElementById('lexPopupContent').innerHTML = listHtml;
            document.getElementById('lexPopup').style.display = 'flex';
        }

        function closeLexPopupDisplay() {
            window.speechSynthesis.cancel();
            document.getElementById('lexPopup').style.display = 'none';
            document.getElementById('lexStatus').innerText = "🎙️ Voice System Standby";
            document.getElementById('lexStatus').style.color = "#22c55e";
        }
    </script>
</body>
</html>
