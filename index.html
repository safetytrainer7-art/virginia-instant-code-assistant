<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEX - Virginia Instant Code Assistant</title>
    <style>
        /* SAFE AREA BOUNDARIES FOR SMARTPHONES */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { 
            width: 100%; 
            height: 100%; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0c111d; 
            color: #f8fafc; 
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        /* MASTER LAYOUT ENGINE */
        .lex-master-frame {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0c111d;
            z-index: 10;
        }

        /* PERFECT SQUARE CANVAS HOUSING */
        .lex-backdrop-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vh; 
            max-height: 100vw;
            aspect-ratio: 1 / 1; 
            background-size: contain;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* HIGH-VISIBILITY MINIMALIST SYSTEM STATUS STRIP AT THE VERY TOP */
        .lex-top-status {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            font-family: monospace;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #22c55e;
            background: rgba(15, 23, 42, 0.9);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            border: 1px solid rgba(234, 179, 8, 0.4);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }

        /* GRID MAPPING INTERACTIVE TOUCH ZONES OVER CHIPS */
        .medallion-touch-grid {
            position: absolute;
            top: 31%; 
            left: 10%;
            width: 53%; 
            height: 52%;
            z-index: 5;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
        }

        .medallion-btn {
            background: rgba(255, 255, 255, 0);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            outline: none;
            touch-action: manipulation;
            transition: background 0.15s ease;
        }
        .medallion-btn:active {
            background: rgba(234, 179, 8, 0.25);
            border: 2px solid rgba(234, 179, 8, 0.5);
        }

        /* TRANSPARENT OVERLAY HOTSPOT DIRECTLY OVER THE MIC GRAPHIC */
        .mic-hotspot-btn {
            position: absolute;
            top: 34%;
            right: 10%;
            width: 20%;
            height: 44%;
            z-index: 5;
            background: rgba(255, 255, 255, 0);
            border-radius: 8px;
            border: none;
            cursor: pointer;
            outline: none;
            touch-action: manipulation;
            transition: background 0.15s ease;
        }
        .mic-hotspot-btn:active {
            background: rgba(38, 189, 248, 0.2);
            border: 2px solid rgba(56, 189, 248, 0.5);
        }

        /* POPUP MODAL ARCHITECTURE FOR STATUTE RETRIEVAL */
        .lex-popup-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 2, 8, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .lex-popup-card {
            width: 100%;
            max-width: 360px;
            background: #0f172a;
            border: 2px solid #eab308;
            border-radius: 6px;
            padding: 1.2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .lex-popup-title {
            font-size: 1.1rem;
            font-weight: 900;
            color: #eab308;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(234, 179, 8, 0.3);
            padding-bottom: 0.4rem;
            margin-bottom: 0.8rem;
            text-align: center;
        }
        .lex-popup-content {
            font-size: 0.85rem;
            line-height: 1.4;
            color: #cbd5e1;
            margin-bottom: 1rem;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 0.5rem;
            border-radius: 4px;
        }
        .lex-close-btn {
            width: 100%;
            padding: 0.65rem;
            background: linear-gradient(180deg, #1e293b, #0f172a);
            border: 1px solid rgba(234, 179, 8, 0.5);
            color: #eab308;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="lex-master-frame">
        <div id="lexStatus" class="lex-top-status">🎙️ System Standby</div>

        <div id="lexBackdrop" class="lex-backdrop-wrapper">
            
            <div class="medallion-touch-grid">
                <button class="medallion-btn" onclick="targetCategoryVoiceEngine('criminal')" title="Criminal Division"></button>
                <button class="medallion-btn" onclick="targetCategoryVoiceEngine('traffic')" title="Traffic Division"></button>
                <button class="medallion-btn" onclick="targetCategoryVoiceEngine('juvenile')" title="Juvenile Division"></button>
                <button class="medallion-btn" onclick="targetCategoryVoiceEngine('game')" title="Game & Fish Division"></button>
            </div>

            <button class="mic-hotspot-btn" onclick="activateVoiceSearchEngine('all')" title="All Divisions Voice Activation"></button>

        </div>
    </div>

    <div id="lexPopup" class="lex-popup-overlay">
        <div class="lex-popup-card">
            <div id="lexPopupTitle" class="lex-popup-title">Statute Lookup Result</div>
            <div id="lexPopupContent" class="lex-popup-content"></div>
            <button class="lex-close-btn" onclick="closeLexPopupDisplay()">Dismiss Record</button>
        </div>
    </div>

    <script>
        // Automatic graphic configuration file layout mapper
        window.addEventListener('load', () => {
            const backdrop = document.getElementById('lexBackdrop');
            const cacheBuster = "?v=" + new Date().getTime();
            
            const img = new Image();
            img.onload = () => {
                backdrop.style.backgroundImage = `url('gggg.png${cacheBuster}')`;
            };
            img.onerror = () => {
                backdrop.style.backgroundImage = `url('gggg.PNG${cacheBuster}')`;
            };
            img.src = 'gggg.png';
        });

        const vaStatuteDatabase = {
            "grand larceny": {
                code: "§ 18.2-95", class: "Felony", category: "criminal",
                details: "Consists of simple larceny not from the person of another of goods/chattels of value of $1,000 or more, or simple larceny from the person of another of money/thing of value of $5 or more."
            },
            "trespassing": {
                code: "§ 18.2-119", class: "Class 1 Misdemeanor", category: "criminal",
                details: "Going upon or remaining upon the lands, buildings or premises of another, after having been forbidden to do so, either orally or in writing, by the owner or lessee."
            },
            "reckless driving": {
                code: "§ 46.2-852", class: "Class 1 Misdemeanor", category: "traffic",
                details: "Driving a vehicle on any highway recklessly or at a speed or in a manner so as to endanger the life, limb, or property of any person, regardless of the maximum speed permitted."
            },
            "dui": {
                code: "§ 18.2-266", class: "Class 1 Misdemeanor", category: "traffic",
                details: "Unlawful for any person to drive or operate any motor vehicle while such person has a blood alcohol concentration of 0.08 percent or more, or under the influence of any self-administered intoxicant."
            }
        };

        function targetCategoryVoiceEngine(categoryType) {
            const statusBox = document.getElementById('lexStatus');
            statusBox.innerText = `🎙️ ${categoryType.toUpperCase()} MODE`;
            statusBox.style.color = "#eab308";
            
            speakVerbalResponse(`Locked to ${categoryType}. State keyword.`);
            
            setTimeout(() => {
                activateVoiceSearchEngine(categoryType);
            }, 1400);
        }

        function activateVoiceSearchEngine(activeFilter = 'all') {
            window.speechSynthesis.cancel();
            const statusBox = document.getElementById('lexStatus');
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                statusBox.innerText = "❌ Speech Blocked";
                statusBox.style.color = "#ef4444";
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                statusBox.innerText = activeFilter === 'all' ? "🎙️ Listening (All Divisions)..." : `🎙️ Listening (${activeFilter.toUpperCase()})...`;
                statusBox.style.color = "#38bdf8";
            };

            recognition.onerror = () => {
                statusBox.innerText = "🎙️ System Standby";
                statusBox.style.color = "#22c55e";
            };

            recognition.onresult = (event) => {
                const spokenText = event.results[0][0].transcript.toLowerCase();
                statusBox.innerText = `Heard: "${spokenText}"`;
                statusBox.style.color = "#eab308";
                
                let matchFound = false;
                for (let keyword in vaStatuteDatabase) {
                    if (spokenText.includes(keyword)) {
                        const targetData = vaStatuteDatabase[keyword];
                        
                        if (activeFilter !== 'all' && targetData.category !== activeFilter) {
                            continue; 
                        }
                        
                        executeStatuteMatchDisplay(keyword);
                        matchFound = true;
                        break;
                    }
                }

                if (!matchFound) {
                    setTimeout(() => {
                        statusBox.innerText = "🎙️ System Standby";
                        statusBox.style.color = "#22c55e";
                        speakVerbalResponse("No matching code entry resolved.");
                    }, 1200);
                }
            };

            recognition.start();
        }

        function executeStatuteMatchDisplay(key) {
            const data = vaStatuteDatabase[key];
            document.getElementById('lexPopupTitle').innerText = `${data.code} - ${key.toUpperCase()}`;
            document.getElementById('lexPopupContent').innerHTML = `
                <p style="margin-bottom: 0.5rem;"><b>Classification:</b> <span style="color:#eab308;">${data.class}</span></p>
                <p><b>Statutory Language:</b> ${data.details}</p>
            `;
            document.getElementById('lexPopup').style.display = 'flex';
            
            const verbalScript = `Virginia Code Section ${data.code}. Classified as a ${data.class}. Law details: ${data.details}`;
            speakVerbalResponse(verbalScript);
        }

        function speakVerbalResponse(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }

        function closeLexPopupDisplay() {
            window.speechSynthesis.cancel();
            document.getElementById('lexPopup').style.display = 'none';
            document.getElementById('lexStatus').innerText = "🎙️ System Standby";
            document.getElementById('lexStatus').style.color = "#22c55e";
        }
    </script>
</body>
</html>
