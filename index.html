<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEX - Virginia Instant Code Assistant</title>
    <style>
        /* SAFE AREA BOUNDARIES FOR SMARTPHONES */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { 
            width: 100%; 
            height: 100%; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0c111d; 
            color: #f8fafc; 
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        /* MASTER LAYOUT ENGINE */
        .lex-master-frame {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0c111d;
            z-index: 10;
        }

        /* PERFECT SQUARE CANVAS HOUSING */
        .lex-backdrop-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vh; 
            max-height: 100vw;
            aspect-ratio: 1 / 1; 
            background-size: contain;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* HIGH-VISIBILITY MINIMALIST SYSTEM STATUS STRIP AT THE VERY TOP */
        .lex-top-status {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            font-family: monospace;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #22c55e;
            background: rgba(15, 23, 42, 0.9);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            border: 1px solid rgba(234, 179, 8, 0.4);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }

        /* GRID MAPPING INTERACTIVE TOUCH ZONES OVER CHIPS */
        .medallion-touch-grid {
            position: absolute;
            top: 31%; 
            left: 10%;
            width: 53%; 
            height: 52%;
            z-index: 5;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
        }

        .medallion-btn {
            background: rgba(255, 255, 255, 0);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            outline: none;
            touch-action: manipulation;
            transition: background 0.15s ease;
        }
        .medallion-btn:active {
            background: rgba(234, 179, 8, 0.25);
            border: 2px solid rgba(234, 179, 8, 0.5);
        }

        /* TRANSPARENT OVERLAY HOTSPOT DIRECTLY OVER THE MIC GRAPHIC */
        .mic-hotspot-btn {
            position: absolute;
            top: 34%;
            right: 10%;
            width: 20%;
            height: 44%;
            z-index: 5;
            background: rgba(255, 255, 255, 0);
            border-radius: 8px;
            border: none;
            cursor: pointer;
            outline: none;
            touch-action: manipulation;
            transition: background 0.15s ease;
        }
        .mic-hotspot-btn:active {
            background: rgba(38, 189, 248, 0.2);
            border: 2px solid rgba(56, 189, 248, 0.5);
        }

        /* POPUP MODAL ARCHITECTURE FOR STATUTE RETRIEVAL */
        .lex-popup-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 2, 8, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .lex-popup-card {
            width: 100%;
            max-width: 360px;
            background: #0f172a;
            border: 2px solid #eab308;
            border-radius: 6px;
            padding: 1.2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .lex-popup-title {
            font-size: 1.1rem;
            font-weight: 900;
            color: #eab308;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(234, 179, 8, 0.3);
            padding-bottom: 0.4rem;
            margin-bottom: 0.8rem;
            text-align: center;
        }
        .lex-popup-content {
            font-size: 0.85rem;
            line-height: 1.4;
            color: #cbd5e1;
            margin-bottom: 1rem;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 0.5rem;
            border-radius: 4px;
        }
        .lex-close-btn {
            width: 100%;
            padding: 0.65rem;
            background: linear-gradient(180deg, #1e293b, #0f172a);
            border: 1px solid rgba(234, 179, 8, 0.5);
            color: #eab308;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
        }

        /* KEY CONFIGURATION FLOATING UTILITY */
        .key-config-trigger {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 90;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.2);
            color: #64748b;
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="lex-master-frame">
        <!-- TOP INDICATOR PANEL CHIP STRIP -->
        <div id="lexStatus" class="lex-top-status">🎙️ System Standby</div>

        <!-- SACRED SQUARE CONTAINER BACKGROUND IMAGE -->
        <div id="lexBackdrop" class="lex-backdrop-wrapper">
            
            <!-- TRANSPARENT HIGH-PERFORMANCE TOUCH TARGET HOVER BUTTONS -->
            <div class="medallion-touch-grid">
                <button class="medallion-btn" onclick="targetCategoryVoiceEngine('criminal', '18.2')" title="Criminal (Title 18.2)"></button>
                <button class="medallion-btn" onclick="targetCategoryVoiceEngine('traffic', '46.2')" title="Traffic (Title 46.2)"></button>
                <button class="medallion-btn" onclick="targetCategoryVoiceEngine('juvenile', '16.1')" title="Juvenile (Title 16.1)"></button>
                <button class="medallion-btn" onclick="targetCategoryVoiceEngine('game', '29.1')" title="Game & Fish (Title 29.1)"></button>
            </div>

            <!-- INVISIBLE MICROPHONE AREA HOTSPOT (ALL DIVISIONS OVERRIDE) -->
            <button class="mic-hotspot-btn" onclick="activateVoiceSearchEngine('all', '')" title="All Divisions Voice Activation"></button>

        </div>
        
        <!-- SECRET KEY UTILITY RE-CONFIGURATOR -->
        <button class="key-config-trigger" onclick="promptUserForApiKey(true)">Update LIS Credentials</button>
    </div>

    <div id="lexPopup" class="lex-popup-overlay">
        <div class="lex-popup-card">
            <div id="lexPopupTitle" class="lex-popup-title">Live LIS Database Record</div>
            <div id="lexPopupContent" class="lex-popup-content"></div>
            <button class="lex-close-btn" onclick="closeLexPopupDisplay()">Dismiss Record</button>
        </div>
    </div>

    <script>
        let LIS_API_KEY = "";

        // Secure client-side credential locker execution
        window.addEventListener('load', () => {
            const backdrop = document.getElementById('lexBackdrop');
            const cacheBuster = "?v=" + new Date().getTime();
            
            const img = new Image();
            img.onload = () => { backdrop.style.backgroundImage = `url('gggg.png${cacheBuster}')`; };
            img.onerror = () => { backdrop.style.backgroundImage = `url('gggg.PNG${cacheBuster}')`; };
            img.src = 'gggg.png';

            promptUserForApiKey(false);
        });

        function promptUserForApiKey(forceReconfigure = false) {
            const statusBox = document.getElementById('lexStatus');
            let savedKey = localStorage.getItem('VA_LIS_KEY');

            if (!savedKey || forceReconfigure) {
                let inputKey = prompt("VA LIS SECURE SETUP:\nPlease enter your required Virginia LIS Database API Key below:", savedKey || "");
                if (inputKey) {
                    localStorage.setItem('VA_LIS_KEY', inputKey);
                    LIS_API_KEY = inputKey;
                    statusBox.innerText = "🎙️ LIS Credentials Secured";
                    statusBox.style.color = "#22c55e";
                } else if (!savedKey) {
                    statusBox.innerText = "❌ LIS API Key Missing";
                    statusBox.style.color = "#ef4444";
                }
            } else {
                LIS_API_KEY = savedKey;
                statusBox.innerText = "🎙️ System Standby";
                statusBox.style.color = "#22c55e";
            }
        }

        function targetCategoryVoiceEngine(categoryName, vaTitleNumber) {
            const statusBox = document.getElementById('lexStatus');
            statusBox.innerText = `🎙️ Title ${vaTitleNumber} Locked`;
            statusBox.style.color = "#eab308";
            
            speakVerbalResponse(`Locked to Title ${vaTitleNumber}. State keyword command.`);
            
            setTimeout(() => {
                activateVoiceSearchEngine(categoryName, vaTitleNumber);
            }, 1400);
        }

        function activateVoiceSearchEngine(categoryFilter, titleConstraint) {
            window.speechSynthesis.cancel();
            const statusBox = document.getElementById('lexStatus');
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                statusBox.innerText = "❌ Speech Systems Blocked";
                statusBox.style.color = "#ef4444";
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                statusBox.innerText = categoryFilter === 'all' ? "🎙️ Listening (All Titles)..." : `🎙️ Listening (Title ${titleConstraint})...`;
                statusBox.style.color = "#38bdf8";
            };

            recognition.onerror = () => {
                statusBox.innerText = "🎙️ System Standby";
                statusBox.style.color = "#22c55e";
            };

            recognition.onresult = (event) => {
                const spokenText = event.results[0][0].transcript.toLowerCase();
                statusBox.innerText = `Searching: "${spokenText}"`;
                statusBox.style.color = "#eab308";
                
                queryVirginiaLegislativeDatabase(spokenText, titleConstraint);
            };

            recognition.start();
        }

        function queryVirginiaLegislativeDatabase(searchKeyword, titleConstraint) {
            const statusBox = document.getElementById('lexStatus');
            
            if (!LIS_API_KEY) {
                statusBox.innerText = "❌ Key Authorization Deficit";
                speakVerbalResponse("Database error. Your local security key is missing.");
                return;
            }

            const targetEndpoint = `https://law.lis.virginia.gov/api/getcodecombosearch/${encodeURIComponent(searchKeyword)}?title=${titleConstraint}&key=${LIS_API_KEY}`;

            fetch(targetEndpoint)
                .then(response => {
                    if (!response.ok) throw new Error("API Connection Rejected");
                    return response.json();
                })
                .then(data => {
                    if (data && data.length > 0) {
                        displayLiveStatuteResult(data[0]);
                    } else {
                        statusBox.innerText = "🎙️ System Standby";
                        statusBox.style.color = "#22c55e";
                        speakVerbalResponse(`No direct matches found for ${searchKeyword}.`);
                    }
                })
                .catch(err => {
                    console.error(err);
                    statusBox.innerText = "❌ Live LIS Timeout";
                    speakVerbalResponse("Connection interface timeout.");
                });
        }

        function displayLiveStatuteResult(record) {
            const sectionNumber = record.SectionNumber || "Live Code";
            const sectionTitle = record.SectionTitle || "Statutory Record";
            const lawBodyText = record.SectionText || "No body text returned.";

            document.getElementById('lexPopupTitle').innerText = `${sectionNumber}`;
            document.getElementById('lexPopupContent').innerHTML = `
                <p style="margin-bottom: 0.5rem; color:#eab308;"><b>Title Description:</b> ${sectionTitle}</p>
                <p style="font-size:0.8rem; line-height:1.4;"><b>Live Statute Language:</b> ${lawBodyText}</p>
            `;
            document.getElementById('lexPopup').style.display = 'flex';
            
            // Clean the legal language so it reads beautifully without audio clipping
            const cleanedAudioText = cleanLegalTextForSpeech(sectionNumber, sectionTitle, lawBodyText);
            speakVerbalResponse(cleanedAudioText);
        }

        // ADVANCED VOCAL CLEANING SCRUBBER ENGINE
        function cleanLegalTextForSpeech(number, title, text) {
            // Step 1: Clean section marker symbols
            let clean = `Virginia Code Section ${number.replace(/§/g, '').trim()}. ${title}. `;
            
            // Step 2: Extract text from any residual raw HTML brackets
            let tempDiv = document.createElement("div");
            tempDiv.innerHTML = text;
            let targetText = tempDiv.textContent || tempDiv.innerText || "";

            // Step 3: Global abbreviation expansion updates
            targetText = targetText.replace(/subdiv\./gi, "subdivision");
            targetText = targetText.replace(/para\./gi, "paragraph");
            targetText = targetText.replace(/va\./gi, "Virginia");
            
            // Step 4: Format code sublists so the reader voices them cleanly
            targetText = targetText.replace(/\(([a-zA-Z0-9]+)\)/g, (match, group) => {
                return `, sub section ${group.toUpperCase()}, `;
            });

            // Step 5: Strip remaining mechanical bracket clutter
            targetText = targetText.replace(/[\/\#\$\%\^\&\*\{\}\[\]\<\>\-\_\=\+\~]/g, " ");
            
            // Step 6: Collapse white space lines to construct fluid pauses
            targetText = targetText.replace(/\s+/g, " ");

            clean += targetText;
            return clean;
        }

        function speakVerbalResponse(text) {
            window.speechSynthesis.cancel();
            
            // Breaks the string chunk into controlled clauses to guarantee device memory stability
            const clauses = text.match(/[^.!?]+[.!?]*/g) || [text];
            
            let clauseIndex = 0;
            function speakNextClause() {
                if (clauseIndex >= clauses.length) return;
                
                const utterance = new SpeechSynthesisUtterance(clauses[clauseIndex].trim());
                utterance.rate = 0.98; // Adjusted pacing speed for clean cabin audio
                utterance.pitch = 1.0;
                
                utterance.onend = () => {
                    clauseIndex++;
                    speakNextClause();
                };
                
                utterance.onerror = () => {
                    clauseIndex++;
                    speakNextClause();
                };

                window.speechSynthesis.speak(utterance);
            }
            
            speakNextClause();
        }

        function closeLexPopupDisplay() {
            window.speechSynthesis.cancel();
            document.getElementById('lexPopup').style.display = 'none';
            document.getElementById('lexStatus').innerText = "🎙️ System Standby";
            document.getElementById('lexStatus').style.color = "#22c55e";
        }
    </script>
</body>
</html>
