<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEX - Virginia Instant Code Assistant</title>
    <style>
        /* SAFE AREA BOUNDARIES FOR SMARTPHONES */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html { 
            width: 100%; 
            height: 100%; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0c111d; 
            color: #f8fafc; 
            overflow: hidden;
            position: fixed;
            touch-action: none;
        }

        /* MASTER LAYOUT ENGINE */
        .lex-master-frame {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0c111d;
            z-index: 10;
        }

        /* PERFECT SQUARE CANVAS HOUSING */
        .lex-backdrop-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100vh; 
            max-height: 100vw;
            aspect-ratio: 1 / 1; 
            background-size: contain;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* HIGH-VISIBILITY MINIMALIST SYSTEM STATUS STRIP AT THE VERY TOP */
        .lex-top-status {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            font-family: monospace;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #22c55e;
            background: rgba(15, 23, 42, 0.95);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            border: 1px solid rgba(234, 179, 8, 0.5);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }

        /* GRID MAPPING INTERACTIVE TOUCH ZONES OVER CHIPS */
        .medallion-touch-grid {
            position: absolute;
            top: 31%; 
            left: 10%;
            width: 53%; 
            height: 52%;
            z-index: 5;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 12px;
        }

        .medallion-btn {
            background: rgba(255, 255, 255, 0);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            outline: none;
            touch-action: manipulation;
            transition: background 0.15s ease;
        }
        .medallion-btn:active {
            background: rgba(234, 179, 8, 0.25);
            border: 2px solid rgba(234, 179, 8, 0.5);
        }

        /* TRANSPARENT OVERLAY HOTSPOT DIRECTLY OVER THE MIC GRAPHIC */
        .mic-hotspot-btn {
            position: absolute;
            top: 34%;
            right: 10%;
            width: 20%;
            height: 44%;
            z-index: 5;
            background: rgba(255, 255, 255, 0);
            border-radius: 8px;
            border: none;
            cursor: pointer;
            outline: none;
            touch-action: manipulation;
            transition: background 0.15s ease;
        }
        .mic-hotspot-btn:active {
            background: rgba(38, 189, 248, 0.2);
            border: 2px solid rgba(56, 189, 248, 0.5);
        }

        /* POPUP MODAL ARCHITECTURE FOR STATUTE RETRIEVAL */
        .lex-popup-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 2, 8, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }
        .lex-popup-card {
            width: 100%;
            max-width: 360px;
            background: #0f172a;
            border: 2px solid #eab308;
            border-radius: 6px;
            padding: 1.2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .lex-popup-title {
            font-size: 1.1rem;
            font-weight: 900;
            color: #eab308;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(234, 179, 8, 0.3);
            padding-bottom: 0.4rem;
            margin-bottom: 0.8rem;
            text-align: center;
        }
        .lex-popup-content {
            font-size: 0.85rem;
            line-height: 1.4;
            color: #cbd5e1;
            margin-bottom: 1rem;
            max-height: 220px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 0.5rem;
            border-radius: 4px;
        }
        .lex-close-btn {
            width: 100%;
            padding: 0.65rem;
            background: linear-gradient(180deg, #1e293b, #0f172a);
            border: 1px solid rgba(234, 179, 8, 0.5);
            color: #eab308;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="lex-master-frame">
        <div id="lexStatus" class="lex-top-status">🎙️ SYSTEM STANDBY</div>

        <div id="lexBackdrop" class="lex-backdrop-wrapper">
            
            <div class="medallion-touch-grid">
                <button class="medallion-btn" onclick="targetCategoryVoiceEngine('criminal', '18.2')" title="Criminal (Title 18.2)"></button>
                <button class="medallion-btn" onclick="targetCategoryVoiceEngine('traffic', '46.2')" title="Traffic (Title 46.2)"></button>
                <button class="medallion-btn" onclick="targetCategoryVoiceEngine('juvenile', '16.1')" title="Juvenile (Title 16.1)"></button>
                <button class="medallion-btn" onclick="targetCategoryVoiceEngine('game', '29.1')" title="Game & Fish (Title 29.1)"></button>
            </div>

            <button class="mic-hotspot-btn" onclick="activateVoiceSearchEngine('all', '')" title="All Divisions Voice Activation"></button>

        </div>
    </div>

    <div id="lexPopup" class="lex-popup-overlay">
        <div class="lex-popup-card">
            <div id="lexPopupTitle" class="lex-popup-title">Tactical Engine Record</div>
            <div id="lexPopupContent" class="lex-popup-content"></div>
            <button class="lex-close-btn" onclick="closeLexPopupDisplay()">Dismiss Record</button>
        </div>
    </div>

    <script>
        // High-precision image loader configuration
        window.addEventListener('load', () => {
            const backdrop = document.getElementById('lexBackdrop');
            const cacheBuster = "?v=" + new Date().getTime();
            
            const img = new Image();
            img.onload = () => { backdrop.style.backgroundImage = `url('gggg.png${cacheBuster}')`; };
            img.onerror = () => { backdrop.style.backgroundImage = `url('gggg.PNG${cacheBuster}')`; };
            img.src = 'gggg.png';
        });

        // MAXIMUM CAPACITY TACTICAL SYSTEM CACHE
        // 100% Offline, Zero Network Lag, Direct Match Configuration
        const tacticalLocalCache = {
            "intoxicated": {
                SectionNumber: "§ 18.2-266",
                SectionTitle: "Driving motor vehicle while intoxicated (DUI / DWI)",
                SectionText: "It shall be unlawful for any person to drive or operate any motor vehicle, engine or train while such person has a blood alcohol concentration of 0.08 percent or more, or while under the influence of alcohol, any narcotic drug, or any other self-administered intoxicant which impairs their ability to operate safely. Violation is an absolute Class 1 Misdemeanor."
            },
            "driving while intoxicated": {
                SectionNumber: "§ 18.2-266",
                SectionTitle: "Driving motor vehicle while intoxicated",
                SectionText: "It shall be unlawful for any person to drive or operate any motor vehicle, engine or train while such person has a blood alcohol concentration of 0.08 percent or more, or while under the influence of alcohol, any narcotic drug, or any other self-administered intoxicant which impairs their ability to operate safely. Violation is a Class 1 Misdemeanor."
            },
            "dui": {
                SectionNumber: "§ 18.2-266",
                SectionTitle: "Driving motor vehicle while intoxicated (DUI)",
                SectionText: "It shall be unlawful for any person to drive or operate any motor vehicle while under the influence of alcohol or drugs with a blood alcohol level of 0.08 or higher. First offense carries mandatory minimum fines and a 12-month driver license revocation. Violation is a Class 1 Misdemeanor."
            },
            "dwi": {
                SectionNumber: "§ 18.2-266",
                SectionTitle: "Driving motor vehicle while intoxicated (DWI)",
                SectionText: "It shall be unlawful for any person to drive or operate any motor vehicle while under the influence of alcohol or drugs with a blood alcohol level of 0.08 or higher. First offense carries mandatory minimum fines and a 12-month driver license revocation. Violation is a Class 1 Misdemeanor."
            },
            "suspended": {
                SectionNumber: "§ 46.2-301",
                SectionTitle: "Driving while license, permit, or privilege to drive suspended or revoked",
                SectionText: "No person whose driver's license, learner's permit, or privilege to drive a motor vehicle has been suspended or revoked shall drive any motor vehicle upon the highways of the Commonwealth. A third conviction within a 10-year period carries a mandatory minimum confinement of 10 days in jail. Violation is a Class 1 Misdemeanor."
            },
            "suspended license": {
                SectionNumber: "§ 46.2-301",
                SectionTitle: "Driving while license suspended or revoked",
                SectionText: "No person whose driver's license, learner's permit, or privilege to drive a motor vehicle has been suspended or revoked shall drive any motor vehicle upon the highways of the Commonwealth. A third conviction within a 10-year period carries a mandatory minimum confinement of 10 days in jail. Violation is a Class 1 Misdemeanor."
            },
            "revoked": {
                SectionNumber: "§ 46.2-301",
                SectionTitle: "Driving while license suspended or revoked",
                SectionText: "No person whose driver's license, learner's permit, or privilege to drive a motor vehicle has been suspended or revoked shall drive any motor vehicle upon the highways of the Commonwealth. Violation is a Class 1 Misdemeanor."
            },
            "reckless driving": {
                SectionNumber: "§ 46.2-852",
                SectionTitle: "Reckless driving; general rule",
                SectionText: "Irrespective of the maximum speeds permitted by law, any person who drives a vehicle on any highway recklessly or at a speed or in a manner so as to endanger the life, limb, or property of any person shall be guilty of reckless driving. Violation is a Class 1 Misdemeanor."
            },
            "reckless": {
                SectionNumber: "§ 46.2-852",
                SectionTitle: "Reckless driving; general rule",
                SectionText: "Irrespective of the maximum speeds permitted by law, any person who drives a vehicle on any highway recklessly or at a speed or in a manner so as to endanger the life, limb, or property of any person shall be guilty of reckless driving. Violation is a Class 1 Misdemeanor."
            },
            "grand larceny": {
                SectionNumber: "§ 18.2-95",
                SectionTitle: "Grand larceny defined; punishment",
                SectionText: "Any person who commits simple larceny not from the person of another of goods and chattels of a value of $1,000 or more, or simple larceny from the person of another of money or things of a value of $5 or more shall be guilty of grand larceny. Punishable by confinement in a state correctional facility for not less than one nor more than 20 years. Felony."
            },
            "larceny": {
                SectionNumber: "§ 18.2-96",
                SectionTitle: "Petit larceny defined; punishment",
                SectionText: "Any person who commits simple larceny not from the person of another of goods and chattels of a value of less than $1,000, or simple larceny from the person of another of money or things of a value of less than $5 shall be guilty of petit larceny. Violation is a Class 1 Misdemeanor."
            },
            "trespassing": {
                SectionNumber: "§ 18.2-119",
                SectionTitle: "Trespass after having been forbidden to do so",
                SectionText: "If any person without authority of law goes upon or remains upon the lands, buildings or premises of another, after having been forbidden to do so, either orally or in writing, by the owner, lessee, custodian, or other authorized person, he shall be guilty of a Class 1 Misdemeanor."
            },
            "refusal": {
                SectionNumber: "§ 18.2-268.3",
                SectionTitle: "Refusal of blood or breath test",
                SectionText: "Any person who operates a motor vehicle on a highway in the Commonwealth is deemed to have given implied consent to have samples of their breath or blood tested if arrested for a violation of driving while intoxicated. Unreasonable refusal is a civil offense for a first violation carrying a 12-month automatic driver's license suspension."
            }
        };

        function targetCategoryVoiceEngine(categoryName, vaTitleNumber) {
            const statusBox = document.getElementById('lexStatus');
            statusBox.innerText = `🎙️ TITLE ${vaTitleNumber} LOCKED`;
            statusBox.style.color = "#eab308";
            
            speakVerbalResponse(`Title ${vaTitleNumber} active. State keyword.`);
            
            setTimeout(() => {
                activateVoiceSearchEngine(categoryName, vaTitleNumber);
            }, 1200);
        }

        function activateVoiceSearchEngine(categoryFilter, titleConstraint) {
            window.speechSynthesis.cancel();
            const statusBox = document.getElementById('lexStatus');
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                statusBox.innerText = "❌ Speech Blocked";
                statusBox.style.color = "#ef4444";
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                statusBox.innerText = categoryFilter === 'all' ? "🎙️ LISTENING..." : `🎙️ LISTENING TITLE ${titleConstraint}...`;
                statusBox.style.color = "#38bdf8";
            };

            recognition.onerror = () => {
                statusBox.innerText = "🎙️ SYSTEM STANDBY";
                statusBox.style.color = "#22c55e";
            };

            recognition.onresult = (event) => {
                const spokenText = event.results[0][0].transcript.toLowerCase().trim();
                statusBox.innerText = `ANALYZING: "${spokenText}"`;
                statusBox.style.color = "#eab308";
                
                // HIGH-SPEED INSTANT SYSTEM SCAN
                let matchFound = false;
                for (let cachedKeyword in tacticalLocalCache) {
                    if (spokenText.includes(cachedKeyword)) {
                        displayLiveStatuteResult(tacticalLocalCache[cachedKeyword]);
                        matchFound = true;
                        break;
                    }
                }

                if (!matchFound) {
                    setTimeout(() => {
                        statusBox.innerText = "🎙️ SYSTEM STANDBY";
                        statusBox.style.color = "#22c55e";
                        speakVerbalResponse(`No matching entry found in local cache database for ${spokenText}.`);
                    }, 1000);
                }
            };

            recognition.start();
        }

        function displayLiveStatuteResult(record) {
            const statusBox = document.getElementById('lexStatus');
            statusBox.innerText = "⚡ RECORD RETRIEVED";
            statusBox.style.color = "#22c55e";

            const sectionNumber = record.SectionNumber || "Live Code";
            const sectionTitle = record.SectionTitle || "Statutory Record";
            const lawBodyText = record.SectionText || "No body text returned.";

            document.getElementById('lexPopupTitle').innerText = `${sectionNumber}`;
            document.getElementById('lexPopupContent').innerHTML = `
                <p style="margin-bottom: 0.5rem; color:#eab308; font-weight:bold;">${sectionTitle}</p>
                <p style="font-size:0.85rem; line-height:1.4; color:#cbd5e1;">${lawBodyText}</p>
            `;
            document.getElementById('lexPopup').style.display = 'flex';
            
            const cleanedAudioText = cleanLegalTextForSpeech(sectionNumber, sectionTitle, lawBodyText);
            speakVerbalResponse(cleanedAudioText);
        }

        function cleanLegalTextForSpeech(number, title, text) {
            let clean = `Virginia Code Section ${number.replace(/§/g, '').trim()}. ${title}. `;
            let targetText = text.replace(/subdiv\./gi, "subdivision")
                                 .replace(/para\./gi, "paragraph")
                                 .replace(/va\./gi, "Virginia");
            
            targetText = targetText.replace(/\(([a-zA-Z0-9]+)\)/g, (match, group) => {
                return `, sub section ${group.toUpperCase()}, `;
            });

            targetText = targetText.replace(/[\/\#\$\%\^\&\*\{\}\[\]\<\>\-\_\=\+\~]/g, " ");
            clean += targetText;
            return clean;
        }

        function speakVerbalResponse(text) {
            window.speechSynthesis.cancel();
            
            const clauses = text.match(/[^.!?]+[.!?]*/g) || [text];
            let clauseIndex = 0;
            
            function speakNextClause() {
                if (clauseIndex >= clauses.length) return;
                
                const utterance = new SpeechSynthesisUtterance(clauses[clauseIndex].trim());
                utterance.rate = 0.98; 
                utterance.pitch = 1.0;
                
                utterance.onend = () => { clauseIndex++; speakNextClause(); };
                utterance.onerror = () => { clauseIndex++; speakNextClause(); };

                window.speechSynthesis.speak(utterance);
            }
            speakNextClause();
        }

        function mergeCacheExtensions(customKey, payloadObject) {
            tacticalLocalCache[customKey.toLowerCase().trim()] = payloadObject;
        }

        function windowResetMatrix() {
            window.speechSynthesis.cancel();
            document.getElementById('lexPopup').style.display = 'none';
            document.getElementById('lexStatus').innerText = "🎙️ SYSTEM STANDBY";
            document.getElementById('lexStatus').style.color = "#22c55e";
        }

        function closeLexPopupDisplay() {
            windowResetMatrix();
        }
    </script>
</body>
</html>
